<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – HotelBooking</title>
  <meta name="description" content="Sign in to your HotelBooking account to manage bookings."/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-page {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    .auth-visual {
      position: relative;
      overflow: hidden;
      background: var(--color-surface);
    }
    .auth-visual-img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.35;
    }
    .auth-visual-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,169,110,0.15) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem;
    }
    .auth-visual-quote {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    .auth-visual-sub { font-size: 0.9rem; color: var(--color-text-muted); }
    .auth-form-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 2rem;
      background: var(--color-bg);
    }
    .auth-form-wrap {
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-title {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }
    .auth-footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }
    .auth-footer-link a { color: var(--color-primary); font-weight: 600; }
    .auth-footer-link a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-visual { display: none; }
    }
  </style>
</head>
<body>
<div class="auth-page">
  <!-- Visual Side -->
  <div class="auth-visual">
    <img class="auth-visual-img" 
         src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200" 
         alt="Luxury hotel lobby"/>
    <div class="auth-visual-overlay">
      <div class="auth-visual-quote">"Every journey deserves a perfect resting place."</div>
      <div class="auth-visual-sub">🏨 HotelBooking — Premium Stays Since 2024</div>
    </div>
  </div>

  <!-- Form Side -->
  <div class="auth-form-side">
    <div class="auth-form-wrap">
      <a href="index.html" class="auth-logo">🏨 HotelBooking</a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to manage your bookings</p>

      <div id="loginAlert"></div>

      <form id="loginForm" novalidate>
        <div style="display:flex;flex-direction:column;gap:1.25rem">
          <div class="form-group" id="emailGroup">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
            <span class="form-error" id="emailError">Please enter a valid email</span>
          </div>

          <div class="form-group" id="passwordGroup">
            <label class="form-label" for="password">Password</label>
            <div style="position:relative">
              <input type="password" id="password" class="form-control" placeholder="••••••••" required/>
              <button type="button" onclick="togglePassword('password', this)"
                style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);color:var(--color-text-muted);font-size:1rem;background:none;border:none;cursor:pointer;">👁</button>
            </div>
            <span class="form-error" id="passwordError">Password is required</span>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center">
            <span id="loginBtnText">Sign In</span>
            <div class="spinner" id="loginSpinner" style="display:none"></div>
          </button>
        </div>
      </form>

      <div class="auth-footer-link">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🔒';
  }

  function showAlert(msg, type = 'error') {
    document.getElementById('loginAlert').innerHTML =
      `<div class="alert alert-${type}"><span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}</div>`;
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    document.getElementById('emailGroup').classList.remove('has-error');
    document.getElementById('passwordGroup').classList.remove('has-error');
    document.getElementById('loginAlert').innerHTML = '';

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('emailGroup').classList.add('has-error');
      valid = false;
    }
    if (!password) {
      document.getElementById('passwordGroup').classList.add('has-error');
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    const spinner = document.getElementById('loginSpinner');
    btn.disabled = true;
    btnText.textContent = 'Signing in...';
    spinner.style.display = 'block';

    try {
      const res = await API.post('/api/auth/login', { email, password });
      const data = res.data?.data;
      if (data?.token) {
        Auth.save(data);
        window.location.href = 'dashboard.html';
      }
    } catch (err) {
      const msg = err.response?.data?.message || 'Invalid email or password. Please try again.';
      showAlert(msg, 'error');
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Sign In';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>

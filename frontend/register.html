<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account – HotelBooking</title>
  <meta name="description" content="Create your HotelBooking account and start booking premium hotels."/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-page { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .auth-visual { position: relative; overflow: hidden; background: var(--color-surface); }
    .auth-visual-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.35; }
    .auth-visual-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,169,110,0.15) 0%, transparent 60%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 3rem;
    }
    .auth-visual-quote {
      font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600;
      color: var(--color-text); line-height: 1.3; margin-bottom: 0.75rem;
    }
    .auth-visual-sub { font-size: 0.9rem; color: var(--color-text-muted); }
    .auth-form-side {
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; padding: 3rem 2rem; background: var(--color-bg);
      overflow-y: auto;
    }
    .auth-form-wrap { width: 100%; max-width: 420px; }
    .auth-logo { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; color: var(--color-primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
    .auth-title { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
    .auth-subtitle { font-size: 0.9rem; color: var(--color-text-muted); margin-bottom: 2rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .auth-footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--color-text-muted); }
    .auth-footer-link a { color: var(--color-primary); font-weight: 600; }
    .auth-footer-link a:hover { text-decoration: underline; }
    .password-strength { margin-top: 0.4rem; }
    .strength-bar { height: 3px; border-radius: 2px; background: var(--color-surface-3); margin-top: 0.4rem; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s ease; }
    .strength-text { font-size: 0.75rem; color: var(--color-text-muted); }
    @media (max-width: 768px) { .auth-page { grid-template-columns: 1fr; } .auth-visual { display: none; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <img class="auth-visual-img" src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=1200" alt="Hotel pool"/>
    <div class="auth-visual-overlay">
      <div class="auth-visual-quote">"Your next unforgettable experience starts here."</div>
      <div class="auth-visual-sub">🌟 Join 50,000+ happy travellers</div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-wrap">
      <a href="index.html" class="auth-logo">🏨 HotelBooking</a>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start booking premium hotels today</p>

      <div id="registerAlert"></div>

      <form id="registerForm" novalidate>
        <div style="display:flex;flex-direction:column;gap:1.1rem">
          <div class="form-row">
            <div class="form-group" id="firstNameGroup">
              <label class="form-label" for="firstName">First Name</label>
              <input type="text" id="firstName" class="form-control" placeholder="John" required/>
              <span class="form-error">Required</span>
            </div>
            <div class="form-group" id="lastNameGroup">
              <label class="form-label" for="lastName">Last Name</label>
              <input type="text" id="lastName" class="form-control" placeholder="Doe" required/>
              <span class="form-error">Required</span>
            </div>
          </div>

          <div class="form-group" id="emailGroup">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
            <span class="form-error" id="emailError">Enter a valid email address</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">Phone Number (optional)</label>
            <input type="tel" id="phone" class="form-control" placeholder="+91 98765 43210"/>
          </div>

          <div class="form-group" id="passwordGroup">
            <label class="form-label" for="password">Password</label>
            <div style="position:relative">
              <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" required oninput="checkStrength(this.value)"/>
              <button type="button" onclick="togglePassword('password', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);color:var(--color-text-muted);font-size:1rem;background:none;border:none;cursor:pointer;">👁</button>
            </div>
            <div class="password-strength">
              <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
              <span class="strength-text" id="strengthText"></span>
            </div>
            <span class="form-error" id="passwordError">Password must be at least 8 characters</span>
          </div>

          <div class="form-group" id="confirmGroup">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat your password" required/>
            <span class="form-error" id="confirmError">Passwords do not match</span>
          </div>

          <button type="submit" class="btn btn-primary" id="registerBtn" style="width:100%;justify-content:center;margin-top:0.5rem">
            <span id="registerBtnText">Create Account</span>
            <div class="spinner" id="registerSpinner" style="display:none"></div>
          </button>
        </div>
      </form>

      <div class="auth-footer-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = Auth.getLandingPage();

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🔒';
  }

  function checkStrength(pwd) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const levels = [
      { pct: '0%', color: 'transparent', label: '' },
      { pct: '25%', color: 'var(--color-danger)', label: 'Weak' },
      { pct: '50%', color: 'var(--color-warning)', label: 'Fair' },
      { pct: '75%', color: 'var(--color-info)', label: 'Good' },
      { pct: '100%', color: 'var(--color-success)', label: 'Strong' },
    ];
    fill.style.width = levels[score].pct;
    fill.style.background = levels[score].color;
    text.textContent = levels[score].label;
    text.style.color = levels[score].color;
  }

  function showAlert(msg, type = 'error') {
    document.getElementById('registerAlert').innerHTML =
      `<div class="alert alert-${type}"><span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}</div>`;
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    let valid = true;
    ['firstNameGroup', 'lastNameGroup', 'emailGroup', 'passwordGroup', 'confirmGroup'].forEach(id => {
      document.getElementById(id)?.classList.remove('has-error');
    });
    document.getElementById('registerAlert').innerHTML = '';

    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!firstName) { document.getElementById('firstNameGroup').classList.add('has-error'); valid = false; }
    if (!lastName) { document.getElementById('lastNameGroup').classList.add('has-error'); valid = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('emailGroup').classList.add('has-error'); valid = false;
    }
    if (!password || password.length < 8) {
      document.getElementById('passwordGroup').classList.add('has-error'); valid = false;
    }
    if (password !== confirm) {
      document.getElementById('confirmGroup').classList.add('has-error');
      document.getElementById('confirmError').textContent = 'Passwords do not match';
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    document.getElementById('registerBtnText').textContent = 'Creating account...';
    document.getElementById('registerSpinner').style.display = 'block';

    try {
      const res = await API.post('/api/auth/register', { firstName, lastName, email, password, phone });
      const data = res.data?.data;
      if (data?.token) {
        Auth.save(data);
        showAlert('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      }
    } catch (err) {
      const msg = err.response?.data?.message || 'Registration failed. Please try again.';
      showAlert(msg, 'error');
    } finally {
      btn.disabled = false;
      document.getElementById('registerBtnText').textContent = 'Create Account';
      document.getElementById('registerSpinner').style.display = 'none';
    }
  });
</script>
</body>
</html>

spring.application.name=hotel-api
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotel_booking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hotel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hotel}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

spring.flyway.enabled=true

app.jwt.secret=${APP_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
app.jwt.issuer=${APP_JWT_ISSUER:hotel-booking}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}
app.serpapi.key=${APP_SERPAPI_KEY:}
app.serpapi.gl=${APP_SERPAPI_GL:in}
app.serpapi.hl=${APP_SERPAPI_HL:en}
app.serpapi.currency=${APP_SERPAPI_CURRENCY:INR}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

logging.level.org.springframework.security=INFO

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotel_booking}
      POSTGRES_USER: ${POSTGRES_USER:-hotel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend/hotel-api
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hotel_booking}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hotel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hotel}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-secret-change-me-dev-secret-change-me}
      APP_JWT_ISSUER: ${APP_JWT_ISSUER:-hotel-booking}
      APP_JWT_EXPIRATION_SECONDS: ${APP_JWT_EXPIRATION_SECONDS:-3600}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    depends_on:
      - db
    ports:
      - "8080:8080"

  web:
    image: nginx:alpine
    depends_on:
      - api
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:

